<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Updated Interface</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            font-family: 'Courier New', monospace;
            background-color: #f0f0f0;
        }
        .session-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            border: 1px solid #ccc;
            background-color: white;
            margin: 20px;
            border-radius: 5px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }
        .chat-only {
            display: none;
        }
        .chat-visible .chat-only {
            display: block;
        }
    </style>
</head>
<body>
    <div class="session-screen">
        <h1>Session Screen</h1>
        <p>Welcome to the chat interface! Have a conversation below:</p>
        <textarea id="chatBox" rows="10" cols="50"></textarea><br/>
        <button type="button">Send</button>
    </div>

    <button id="toggleChat" type="button">Toggle Chat Only</button>

    <script>
        document.getElementById('toggleChat').onclick = function() {
            document.body.classList.toggle('chat-visible');
        };
    </script>
</body>
</html>
